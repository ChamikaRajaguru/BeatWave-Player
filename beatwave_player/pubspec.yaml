name: beatwave_player
description: "BeatWave — Premium Flutter MP3 Music Player with Equalizer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Audio
  just_audio: ^0.9.42
  audio_service: ^0.18.17
  on_audio_query: ^2.9.0
  audio_session: ^0.1.21

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true


